<svg id="anova-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
                <defs>
                    <!-- Background Dark Gradients -->
                    <linearGradient id="hexBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#242834"/>
                        <stop offset="50%" stop-color="#151820"/>
                        <stop offset="100%" stop-color="#0A0C11"/>
                    </linearGradient>
                    <linearGradient id="hexBorder" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#4A5568" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="#1A202C" stop-opacity="0.8"/>
                    </linearGradient>

                    <!-- Glowing Color Gradients -->
                    <linearGradient id="anovaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#FFCA28"/>
                        <stop offset="40%" stop-color="#FF9800"/>
                        <stop offset="100%" stop-color="#FF3D00"/>
                    </linearGradient>
                    
                    <linearGradient id="waterFrontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.85"/>
                        <stop offset="40%" stop-color="#0088FF" stop-opacity="0.6"/>
                        <stop offset="100%" stop-color="#001144" stop-opacity="0.2"/>
                    </linearGradient>

                    <linearGradient id="waterBackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#00AAFF" stop-opacity="0.6"/>
                        <stop offset="50%" stop-color="#0044BB" stop-opacity="0.4"/>
                        <stop offset="100%" stop-color="#000033" stop-opacity="0.1"/>
                    </linearGradient>

                    <!-- Radial Heat Glow -->
                    <radialGradient id="heatGlow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#FF3D00" stop-opacity="0.9"/>
                        <stop offset="50%" stop-color="#FF7300" stop-opacity="0.4"/>
                        <stop offset="100%" stop-color="#FF3D00" stop-opacity="0"/>
                    </radialGradient>

                    <!-- Glass Reflection Gradient -->
                    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
                        <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.05"/>
                        <stop offset="30.1%" stop-color="#FFFFFF" stop-opacity="0"/>
                        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
                    </linearGradient>

                    <!-- Glow Filters -->
                    <filter id="glow5" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="5" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    
                    <filter id="glow15" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="15" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    
                    <filter id="blur12" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="12"/>
                    </filter>

                    <filter id="blur25" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="25"/>
                    </filter>

                    <!-- Hexagon Clip Path to contain water -->
                    <clipPath id="hexClip">
                        <path d="M 200 45 L 334.2 122.5 L 334.2 277.5 L 200 355 L 65.8 277.5 L 65.8 122.5 Z"/>
                    </clipPath>
                </defs>

                <!-- 1. Background Hexagon with Shadow -->
                <path d="M 200 45 L 334.2 122.5 L 334.2 277.5 L 200 355 L 65.8 277.5 L 65.8 122.5 Z" fill="#000000" filter="url(#blur12)" opacity="0.6" transform="translate(0, 10)"/>
                <path d="M 200 45 L 334.2 122.5 L 334.2 277.5 L 200 355 L 65.8 277.5 L 65.8 122.5 Z" fill="url(#hexBgGrad)" stroke="url(#hexBorder)" stroke-width="6" stroke-linejoin="round"/>

                <!-- 2. Tech / Integration Lines Background -->
                <g opacity="0.15" fill="none" stroke="#00E5FF" stroke-width="1.5">
                    <!-- Circuit Paths -->
                    <path d="M 200 45 L 200 90"/>
                    <path d="M 120 150 L 160 150 L 180 170"/>
                    <path d="M 280 150 L 240 150 L 220 170"/>
                    <circle cx="120" cy="150" r="3" fill="#00E5FF"/>
                    <circle cx="280" cy="150" r="3" fill="#00E5FF"/>
                    <!-- Background target rings -->
                    <circle cx="200" cy="200" r="110" stroke-width="1" stroke-dasharray="4 8"/>
                </g>

                <!-- 3. Submerged Elements & Water Waves (Clipped to Hexagon) -->
                <g clip-path="url(#hexClip)">
                    <!-- Back Wave Phase -->
                    <path d="M 60 210 Q 110 240, 155 210 T 245 210 T 340 210 L 340 360 L 60 360 Z" fill="url(#waterBackGrad)"/>
                    
                    <!-- Intensive Heat Glow in the Water under the Anova Wand -->
                    <ellipse cx="200" cy="270" rx="80" ry="30" fill="url(#heatGlow)" filter="url(#blur12)" opacity="0.8"/>

                    <!-- Front Wave Phase -->
                    <path d="M 60 220 Q 110 190, 155 220 T 245 220 T 340 220 L 340 360 L 60 360 Z" fill="url(#waterFrontGrad)"/>
                    
                    <!-- Glowing Rim of the Front Wave -->
                    <path d="M 60 220 Q 110 190, 155 220 T 245 220 T 340 220" fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#glow5)" opacity="0.9"/>
                    <path d="M 60 220 Q 110 190, 155 220 T 245 220 T 340 220" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.8"/>

                    <!-- Rising Bubbles in the water -->
                    <g fill="#FFFFFF">
                        <circle cx="120" cy="310" r="3.5" opacity="0.3"/>
                        <circle cx="135" cy="270" r="2" opacity="0.5"/>
                        <circle cx="105" cy="250" r="2.5" opacity="0.4"/>
                        <circle cx="170" cy="285" r="8" opacity="0.3" fill="#00FFFF"/>
                        <circle cx="170" cy="285" r="4" opacity="0.8" fill="#00FFFF"/>
                        <circle cx="185" cy="255" r="2" opacity="0.5"/>
                        <circle cx="215" cy="290" r="3" opacity="0.4"/>
                        <circle cx="230" cy="245" r="4.5" opacity="0.3"/>
                        <circle cx="275" cy="320" r="3" opacity="0.4"/>
                        <circle cx="290" cy="260" r="2.5" opacity="0.5"/>
                    </g>
                </g>

                <!-- 4. The Prominent Anova 'A' (The Sous Vide Device) -->
                <!-- Ambient Orange Core Glow -->
                <path d="M 177.5 100 L 222.5 100 L 285 280 L 240 280 L 200 164.8 L 160 280 L 115 280 Z" fill="#FF5722" filter="url(#blur25)" opacity="0.7"/>
                
                <!-- Tight Neon Glow -->
                <path d="M 177.5 100 L 222.5 100 L 285 280 L 240 280 L 200 164.8 L 160 280 L 115 280 Z" fill="#FF9800" filter="url(#blur12)" opacity="0.9"/>
                
                <!-- Main Bold Path -->
                <path d="M 177.5 100 L 222.5 100 L 285 280 L 240 280 L 200 164.8 L 160 280 L 115 280 Z" fill="url(#anovaGrad)"/>

                <!-- 6. Foreground Premium Gloss / Glass Edge -->
                <!-- Full Hexagon Diagonal Reflection -->
                <path d="M 200 45 L 334.2 122.5 L 334.2 277.5 L 200 355 L 65.8 277.5 L 65.8 122.5 Z" fill="url(#glassGrad)" pointer-events="none"/>
                
                <!-- Bright Cyan Inner Rim Highlight (Top Left to Right) -->
                <path d="M 65.8 122.5 L 200 45 L 334.2 122.5" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.4" pointer-events="none"/>
            </svg>