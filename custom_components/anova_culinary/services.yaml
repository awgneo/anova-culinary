save_recipe:
  name: Save Recipe
  description: Save a multi-stage Apo recipe to central storage.
  fields:
    name:
      name: Recipe Name
      description: The name of the recipe (must be unique).
      required: true
      selector:
        text:
    stages:
      name: Stages
      description: List of stage objects
      required: true
      selector:
        object:
delete_recipe:
  name: Delete Recipe
  description: Delete a saved recipe by name.
  fields:
    name:
      name: Recipe Name
      description: The name of the recipe to delete.
      required: true
      selector:
        text:
play_recipe:
  name: Play Recipe
  description: Play a saved recipe on a specific oven.
  fields:
    device_id:
      name: Device ID
      description: The ID of the target oven.
      required: true
      selector:
        text:
    recipe_id:
      name: Recipe ID
      description: The UUID of the recipe to play.
      required: true
      selector:
        text:
adjust_timer:
  name: Adjust Timer
  description: Adjusts the oven timer target by a specific amount of minutes.
  fields:
    entity_id:
      name: Entity ID
      description: The ID of the oven timer number entity.
      required: true
      selector:
        entity:
          domain: number
    amount:
      name: Amount
      description: The amount of minutes to add (positive) or subtract (negative).
      required: true
      selector:
        number:
