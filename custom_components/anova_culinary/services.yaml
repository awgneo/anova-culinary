save_recipe:
  name: Save Recipe
  description: Save a multi-stage Apo recipe to central storage.
  fields:
    name:
      name: Recipe Name
      description: The name of the recipe (must be unique).
      required: true
      selector:
        text:
    stages:
      name: Stages
      description: List of stage objects
      required: true
      selector:
        object:
delete_recipe:
  name: Delete Recipe
  description: Delete a saved recipe by name.
  fields:
    name:
      name: Recipe Name
      description: The name of the recipe to delete.
      required: true
      selector:
        text:
play_recipe:
  name: Play Recipe
  description: Play a saved recipe on a specific oven.
  fields:
    device_id:
      name: Device ID
      description: The ID of the target oven.
      required: true
      selector:
        text:
    recipe_id:
      name: Recipe ID
      description: The UUID of the recipe to play.
      required: true
      selector:
        text:
